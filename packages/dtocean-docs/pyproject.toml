[project]
name = "dtocean-docs"
version = "4.0.2"
description = "Offline DTOcean documentation for dtocean-app"
authors = [{ name = "The DTOcean Developers" }]
maintainers = [{ name = "Mathew Topper", email = "damm_horse@yahoo.co.uk" }]
readme = "README.md"
license = "GPL-3.0-or-later"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]
requires-python = ">=3.12,<3.15"

[project.scripts]
dtocean-docs = 'dtocean_docs._cli:run'

[project.urls]
homepage = "https://python-poetry.org/"
repository = "https://github.com/DTOcean/dtocean"
issues = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry]
include = [{ path = "src/dtocean_docs/html", format = "wheel" }]

[tool.poetry.dependencies]

[tool.poetry.group.test]
optional = true

[tool.poetry.group.test.dependencies]
pytest = "^8.3.4"
pytest-cov = "^6.0.0"
pytest-mock = "^3.14.0"

[tool.poetry.group.dtocean-core]
optional = true

[tool.poetry.group.dtocean-core.dependencies]
dtocean-core = { path = "../dtocean-core", develop = true }

[tool.poetry.group.test-extras]
optional = true
include-groups = ["dtocean-core"]

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
ruff = "^0.8.3"
pyright = "^1.1.396"

[tool.poetry.group.tox]
optional = true

[tool.poetry.group.tox.dependencies]
tox = "<4.47"
tox-uv = "<1.33.0"

[tool.poetry.build]
script = "scripts/build-docs.py"

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '^'

[tool.pyright]
typeCheckingMode = "basic"

[tool.ruff]
line-length = 80

[tool.semantic_release]
commit_parser = "../../scripts/dtocean_commit_parser.py:DTOceanCommitParser"
commit_message = """\
chore(release): dtocean-docs@{version}

Automatically generated by python-semantic-release
"""
tag_format = "dtocean-docs-v{version}"
version_toml = ["pyproject.toml:project.version"]

[tool.semantic_release.branches.main]
match = "(main)"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.commit_parser_options]
scope_prefix = "(docs|dtocean-docs|root)"

[tool.semantic_release.commit_parser_options.path_filters.main]
paths = ["."]

[tool.semantic_release.commit_parser_options.path_filters.docs]
paths = ["../../docs"]
max_bump_level = 2

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.14", "3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "dtocean-core",
        "--only",
        "dtocean-docs",
        "--only",
        "test",
    ],
]
commands = [["poetry", "run", "pytest", "tests"]]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [["poetry", "sync", "--only", "audit", "--only", "dtocean-docs"]]
commands = [
    [
        "poetry",
        "run",
        "ruff",
        "check",
    ],
    [
        "poetry",
        "run",
        "pyright",
        "src",
    ],
]

[build-system]
requires = [
    "poetry-core>=2.0.0,<3.0.0",
    "sphinx-multiversion @ git+https://github.com/sphinx-contrib/multiversion.git",
    "sphinx-rtd-theme",
]
build-backend = "poetry.core.masonry.api"
