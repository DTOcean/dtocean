[tool.poetry]
name = "polite-config"
version = "3.0.1"
authors = ["The DTOcean Developers"]
maintainers = ["Mathew Topper <damm_horse@yahoo.co.uk>"]
description = "Easy functions for paths, logging and configuration files"
readme = "README.md"
license = "MIT"
repository = "https://github.com/DTOcean/dtocean"
homepage = "https://dtocean.github.io/dtocean"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]

[tool.poetry.urls]
"Bug Tracker" = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry.dependencies]
python = ">=3.12,<3.15"

[tool.poetry.group.main]
include-groups = ["polite-config"]

[tool.poetry.group.polite-config.dependencies]
configobj = "^5.0.9"
pyyaml = "^6.0.2"

[tool.poetry.group.test]
optional = true

[tool.poetry.group.test.dependencies]
pytest = "^9.0.3"
pytest-cov = "^6.0.0"
pytest-mock = "^3.14.0"

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
pyright = "^1.1.390"
ruff = "^0.8.3"

[tool.poetry.group.tox]
optional = true

[tool.poetry.group.tox.dependencies]
tox = "<4.47"
tox-uv = "<1.33.0"

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '^'

[tool.coverage.run]
branch = true
omit = [
    "src/polite_config/appdirs.py", # omit appdirs as developed externally
]
source = ["src"]

[tool.pyright]
ignore = ["src/polite_config/appdirs.py"]
typeCheckingMode = "basic"

[tool.ruff]
exclude = ["src/polite_config/appdirs.py"]
line-length = 80

[tool.semantic_release]
commit_parser = "../../scripts/dtocean_commit_parser.py:DTOceanCommitParser"
commit_message = """\
chore(release): polite-config@{version}

Automatically generated by python-semantic-release
"""
tag_format = "polite-config-v{version}"
version_toml = ["pyproject.toml:tool.poetry.version"]

[tool.semantic_release.branches.main]
match = "(main)"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.commit_parser_options]
scope_prefix = "polite-config"

[tool.semantic_release.commit_parser_options.path_filters.main]
paths = ["."]

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.14", "3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [["poetry", "sync", "--only", "polite-config", "--only", "test"]]
commands = [["poetry", "run", "pytest", "tests"]]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "polite-config",
        "--only",
        "audit",
    ],
]
commands = [
    [
        "poetry",
        "run",
        "ruff",
        "check",
    ],
    [
        "poetry",
        "run",
        "pyright",
        "src",
    ],
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
