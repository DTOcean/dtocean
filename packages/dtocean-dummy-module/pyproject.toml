[tool.poetry]
name = "dtocean-dummy-module"
version = "1.0.0"
description = "Dummy DTOcean module used in mdo-engine tests"
authors = ["The DTOcean Developers"]
maintainers = ["Mathew Topper <damm_horse@yahoo.co.uk>"]
license = "GPL-3.0-or-later"
readme = "README.md"
repository = "https://github.com/DTOcean/dtocean"
homepage = "https://dtocean.github.io/dtocean"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]
packages = [{ include = "dtocean_dummy", from = "src" }]

[tool.poetry.urls]
"Bug Tracker" = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry.scripts]
dtocean-dummy = 'dtocean_dummy.command:module_interface'

[tool.poetry.dependencies]
python = ">=3.12,<3.15"

[tool.poetry.group.main]
include-groups = ["dtocean-dummy-module"]

[tool.poetry.group.dtocean-dummy-module.dependencies]
numpy = "^2.3.5"
pandas = "^3.0.1"
openpyxl = "^3.1.5"
xlrd = "^2.0.1"
xlwt = "^1.3.0"
polite-config = { path = "../polite-config", develop = true }
python-dateutil = "^2.9.0.post0"

[tool.poetry.group.test]
optional = true

[tool.poetry.group.test.dependencies]
pytest = "^9.0.3"
pytest-cov = "^6.0.0"

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
pyright = "^1.1.390"
ruff = "^0.8.3"

[tool.poetry.group.tox]
optional = true

[tool.poetry.group.tox.dependencies]
tox = "<4.47"
tox-uv = "<1.33.0"

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '~'

[tool.pyright]
typeCheckingMode = "basic"

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.14", "3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "dtocean-dummy-module",
        "--only",
        "test",
    ],
]
commands = [["poetry", "run", "pytest", "tests"]]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "dtocean-dummy-module",
        "--only",
        "audit",
    ],
]
commands = [
    [
        "poetry",
        "run",
        "ruff",
        "check",
    ],
    [
        "poetry",
        "run",
        "pyright",
        "src",
    ],
]

[tool.ruff]
line-length = 80

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
