[tool.poetry]
name = "dtocean-core"
version = "4.0.2"
description = "The main (non-graphical) interface for the DTOcean tools"
authors = ["The DTOcean Developers"]
maintainers = ["Mathew Topper <damm_horse@yahoo.co.uk>"]
license = "GPL-3.0-or-later"
readme = "README.md"
repository = "https://github.com/DTOcean/dtocean"
homepage = "https://dtocean.github.io/dtocean"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]
packages = [
    { include = "dtocean_core", from = "src" },
    { include = "dtocean_plugins", from = "src" },
]

[tool.poetry.urls]
"Bug Tracker" = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry.scripts]
dtocean = 'dtocean_core.utils.cli:main'
_dtocean-optim-pos = 'dtocean_plugins.strategies.position_optimiser.iterator:interface'

[tool.poetry.dependencies]
python = ">=3.12,<3.14"

[tool.poetry.group.main]
include-groups = ["dtocean-core"]

[tool.poetry.group.dtocean-core.dependencies]
mdo-engine = { path = "../mdo-engine", develop = true }
polite-config = { path = "../polite-config", develop = true }
cma = "^4.4.1"
cycler = "^0.12.1"
geoalchemy2 = "^0.18.4"
matplotlib = "^3.10.8"
natsort = "^8.4.0"
netcdf4 = "^1.7.2"
numpy = "^2.3.5"
openpyxl = "^3.1.5"
pandas = "^3.0.1"
pyproj = "^3.6.1"
pyshp = "^2.3.1"
python-dateutil = "^2.9.0.post0"
pyyaml = "^6.0.2"
ruamel-yaml-clib = "^0.2.12"
ruamel-yaml = "^0.19.1"
scipy = "^1.17.0"
shapely = "^2.0.6"
utm = "^0.8.1"
xarray = "~2026.2.0"
xlrd = "^2.0.1"
pywin32 = { version = ">=308", platform = "win32" }
cmocean = "^4.0.3"
packaging = ">=24.0"
cartopy = "^0.25.0"

[tool.poetry.group.test]
optional = true

[tool.poetry.group.test.dependencies]
pytest = "^9.0.3"
pytest-mock = "^3.14.0"
mock = "^5.1.0"
pytest-cov = "^6.0.0"
pytest-postgresql = "^7.0.1"
pytz = "^2025.2"

[tool.poetry.group.dtocean-app]
optional = true

[tool.poetry.group.dtocean-app.dependencies]
dtocean-app = { path = "../dtocean-app", develop = true }

[tool.poetry.group.test-extras]
optional = true
include-groups = ["dtocean-app"]

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
ruff = "^0.8.3"
pyright = "^1.1.395"
deptry = "^0.21.1"

[tool.poetry.group.tox]
optional = true

[tool.poetry.group.tox.dependencies]
tox = "<4.47"
tox-uv = "<1.33.0"

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '^'

[tool.pytest.ini_options]
filterwarnings = ['ignore:numpy.ndarray size changed:RuntimeWarning']
testpaths = ["tests"]

[tool.pyright]
typeCheckingMode = "basic"

[tool.ruff]
line-length = 80

[tool.semantic_release]
commit_parser = "../../scripts/dtocean_commit_parser.py:DTOceanCommitParser"
commit_message = """\
chore(release): dtocean-core@{version}

Automatically generated by python-semantic-release
"""
tag_format = "dtocean-core-v{version}"
version_toml = ["pyproject.toml:tool.poetry.version"]

[tool.semantic_release.branches.main]
match = "(main)"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.commit_parser_options]
scope_prefix = "dtocean-core"

[tool.semantic_release.commit_parser_options.path_filters.main]
paths = ["."]

[tool.semantic_release.commit_parser_options.path_filters.mdo-engine]
paths = ["../mdo-engine"]
max_bump_level = 2
trigger_bump_level = 4

[tool.semantic_release.commit_parser_options.path_filters.polite-config]
paths = ["../polite-config"]
max_bump_level = 2
trigger_bump_level = 4

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.14", "3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "dtocean-app",
        "--only",
        "dtocean-core",
        "--only",
        "test",
        "--only",
        "test-postgresql",
    ],
    [
        "poetry",
        "run",
        "dtocean",
        "init",
    ],
]
commands = [
    [
        "poetry",
        "run",
        "pytest",
        { replace = "posargs", extend = true },
        "tests",
    ],
]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "dtocean-app",
        "--only",
        "dtocean-core",
        "--only",
        "audit",
    ],
]
commands = [
    [
        "poetry",
        "run",
        "ruff",
        "check",
    ],
    [
        "poetry",
        "run",
        "pyright",
        "src",
    ],
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
