[tool.poetry]
name = "mdo-engine"
version = "1.0.13"
description = "Data management, coupling and execution for MDO problems"
authors = ["The DTOcean Developers"]
maintainers = ["Mathew Topper <damm_horse@yahoo.co.uk>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/DTOcean/dtocean"
homepage = "https://dtocean.github.io/dtocean"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]


[tool.poetry.urls]
"Bug Tracker" = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry.dependencies]
python = ">=3.12,<3.15"

[tool.poetry.group.main]
include-groups = ["mdo-engine"]

[tool.poetry.group.mdo-engine.dependencies]
openpyxl = "^3.1.5"
pandas = "^3.0.1"
pyyaml = "^6.0.2"
sqlalchemy = "^2.0.36"
xlrd = "^2.0.1"
xlwt = "^1.3.0"
polite-config = { path = "../polite-config", develop = true }
python-box = "^7.2.0"
pandas-stubs = "^3.0.0.260204"
psycopg = { extras = ["binary"], version = "^3.2.6" }
geoalchemy2 = "^0.18.4"
shapely = "^2.0.7"

[tool.poetry.group.dtocean-dummy-module]
optional = true

[tool.poetry.group.dtocean-dummy-module.dependencies]
dtocean-dummy-module = { path = "../dtocean-dummy-module" }

[tool.poetry.group.test]
optional = true
include-groups = ["dtocean-dummy-module"]

[tool.poetry.group.test.dependencies]
pytest = "^8.3.4"
pytest-mock = "^3.14.0"
mock = "^5.1.0"
pytest-cov = "^6.0.0"
pytest-postgresql = "^7.0.2"

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
ruff = "^0.8.3"
pyright = "^1.1.395"

[tool.poetry.group.tox]
optional = true

[tool.poetry.group.tox.dependencies]
tox = "<4.47"
tox-uv = "<1.33.0"

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '^'

[tool.pyright]
typeCheckingMode = "basic"

[tool.ruff]
line-length = 80

[tool.semantic_release]
commit_parser = "../../scripts/dtocean_commit_parser.py:DTOceanCommitParser"
commit_message = """\
chore(release): mdo-engine@{version}

Automatically generated by python-semantic-release
"""
tag_format = "mdo-engine-v{version}"
version_toml = ["pyproject.toml:tool.poetry.version"]

[tool.semantic_release.branches.main]
match = "(main)"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.commit_parser_options]
scope_prefix = "mdo-engine"

[tool.semantic_release.commit_parser_options.path_filters.main]
paths = ["."]

[tool.semantic_release.commit_parser_options.path_filters.polite-config]
paths = ["../polite-config"]
max_bump_level = 2
trigger_bump_level = 4

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.14", "3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "dtocean-dummy-module",
        "--only",
        "mdo-engine",
        "--only",
        "test",
        "--only",
        "test-postgresql",
    ],
]
commands = [
    [
        "poetry",
        "run",
        "pytest",
        { replace = "posargs", extend = true },
        "tests",
    ],
]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [["poetry", "sync", "--only", "mdo-engine", "--only", "audit"]]
commands = [
    [
        "poetry",
        "run",
        "ruff",
        "check",
    ],
    [
        "poetry",
        "run",
        "pyright",
        "src",
    ],
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
