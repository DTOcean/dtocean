[tool.poetry]
name = "dtocean-app"
version = "4.0.3"
description = "Main graphical application for the DTOcean tools"
authors = ["The DTOcean Developers"]
maintainers = ["Mathew Topper <damm_horse@yahoo.co.uk>"]
readme = "README.md"
repository = "https://github.com/DTOcean/dtocean"
homepage = "https://dtocean.github.io/dtocean"
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX :: Linux",
]
packages = [
  { include = "dtocean_app", from = "src" },
  { include = "dtocean_plugins", from = "src" },
]
include = [
  { path = "designer", format = "sdist" },
  { path = 'src/dtocean_app/designer/**/*.py', format = "wheel" },
]

[tool.poetry.urls]
"Bug Tracker" = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry.build]
script = "scripts/build-widgets.py"

[tool.poetry.dependencies]
python = ">=3.12,<3.14"

[tool.poetry.group.main]
include-groups = ["dtocean-app"]

[tool.poetry.group.dtocean-app.dependencies]
dtocean-core = { path = "../dtocean-core", develop = true }
dtocean-qt = { path = "../dtocean-qt", develop = true }
mdo-engine = { path = "../mdo-engine", develop = true }
polite-config = { path = "../polite-config", develop = true }
matplotlib = "^3.10.8"
numpy = "^2.3.5"
pandas = "^3.0.1"
shiboken6 = "^6.9.0"
pyside6 = "^6.9.0"
pillow = "^12.2.0"
pywin32 = { version = ">=308", platform = "win32" }
pyshortcuts = "^1.9.7"

[tool.poetry.group.test-qt]
optional = true

[tool.poetry.group.test-qt.dependencies]
pytest-qt = "^4.5.0"

[tool.poetry.group.test]
optional = true
include-groups = ["test-qt"]

[tool.poetry.group.test.dependencies]
mock = "^5.1.0"
pytest = "^9.0.3"
pytest-mock = "^3.14.0"
pytest-cov = "^6.0.0"

[tool.poetry.group.dtocean]
optional = true

[tool.poetry.group.dtocean.dependencies]
dtocean = { path = "../dtocean", develop = true }

[tool.poetry.group.dtocean-docs]
optional = true

[tool.poetry.group.dtocean-docs.dependencies]
dtocean-docs = { path = "../dtocean-docs", develop = true }

[tool.poetry.group.test-extras]
optional = true
include-groups = ["dtocean", "dtocean-docs"]

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
ruff = "^0.8.3"
pyright = "^1.1.396"
deptry = "^0.21.1"
pandas-stubs = "^3.0.0.260204"

[tool.poetry.group.tox]
optional = true

[tool.poetry.group.tox.dependencies]
tox = "<4.47"
tox-uv = "<1.33.0"

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '^'

[tool.pyright]
typeCheckingMode = "basic"
"exclude" = ["src/dtocean_app/designer/**"]

[tool.ruff]
line-length = 80

[tool.semantic_release]
commit_parser = "../../scripts/dtocean_commit_parser.py:DTOceanCommitParser"
commit_message = """\
chore(release): dtocean-app@{version}

Automatically generated by python-semantic-release
"""
tag_format = "dtocean-app-v{version}"
version_toml = ["pyproject.toml:tool.poetry.version"]

[tool.semantic_release.branches.main]
match = "(main)"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
  '''chore(?:\([^)]*?\))?: .+''',
  '''ci(?:\([^)]*?\))?: .+''',
  '''refactor(?:\([^)]*?\))?: .+''',
  '''style(?:\([^)]*?\))?: .+''',
  '''test(?:\([^)]*?\))?: .+''',
  '''build\((?!deps\): .+)''',
  '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.commit_parser_options]
scope_prefix = "dtocean-app"

[tool.semantic_release.commit_parser_options.path_filters.main]
paths = ["."]

[tool.semantic_release.commit_parser_options.path_filters.polite-config]
paths = ["../polite-config"]
max_bump_level = 2
trigger_bump_level = 4

[tool.semantic_release.commit_parser_options.path_filters.mdo-engine]
paths = ["../mdo-engine"]
max_bump_level = 2
trigger_bump_level = 4

[tool.semantic_release.commit_parser_options.path_filters.dtocean-core]
paths = ["../dtocean-core"]
max_bump_level = 2
trigger_bump_level = 4

[tool.semantic_release.commit_parser_options.path_filters.dtocean-qt]
paths = ["../dtocean-qt"]
max_bump_level = 2
trigger_bump_level = 4

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.14", "3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
  [
    "poetry",
    "sync",
    "--only",
    "dtocean",
    "--only",
    "dtocean-app",
    "--only",
    "dtocean-docs",
    "--only",
    "test",
    "--only",
    "test-qt",
  ],
]
commands = [["poetry", "run", "pytest", "tests"]]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [["poetry", "sync", "--only", "audit", "--only", "dtocean-app"]]
commands = [
  [
    "poetry",
    "run",
    "ruff",
    "check",
  ],
  [
    "poetry",
    "run",
    "pyright",
    "src",
  ],
]

[build-system]
requires = ["poetry-core", "pyside6"]
build-backend = "poetry.core.masonry.api"
