[project]
name = "dtocean"
description = "Design and techno-economic assessment of marine renewable energy arrays."
license = "GPL-3.0-or-later"
readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]
requires-python = ">=3.12,<3.14"
authors = [{ name = "The DTOcean Developers" }]
maintainers = [{ name = "Mathew Topper", email = "damm_horse@yahoo.co.uk" }]
dynamic = ["version"]

[project.urls]
homepage = "https://python-poetry.org/"
repository = "https://github.com/DTOcean/dtocean"
issues = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry]
version = "0.0.0"

[tool.poetry.dependencies]

[tool.poetry.group.main]
include-groups = ["dtocean"]

[tool.poetry.group.dtocean.dependencies]
dtocean-app = { path = "../dtocean-app", develop = true }
dtocean-economics = { path = "../dtocean-economics", develop = true }
dtocean-docs = { path = "../dtocean-docs", develop = true }
dtocean-hydrodynamics = { path = "../dtocean-hydrodynamics", develop = true }

[tool.poetry.group.test]
optional = true

[tool.poetry.group.test.dependencies]
pytest = "^9.0.3"
pytest-cov = "^6.0.0"

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
ruff = "^0.8.3"
pyright = "^1.1.396"

[tool.poetry.group.tox]
optional = true

[tool.poetry.group.tox.dependencies]
tox = "<4.47"
tox-uv = "<1.33.0"

[tool.poetry-dynamic-versioning]
enable = true

[tool.poetry-dynamic-versioning.from-file]
source = "../../pyproject.toml"
pattern = 'version.*=.*"([\d.]+)"'

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '^'

[tool.pyright]
typeCheckingMode = "basic"

[tool.ruff]
line-length = 80

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [["poetry", "sync", "--only", "dtocean", "--only", "test"]]
commands = [["poetry", "run", "pytest", "tests"]]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [["poetry", "sync", "--only", "audit", "--only", "dtocean"]]
commands = [
    [
        "poetry",
        "run",
        "ruff",
        "check",
    ],
    [
        "poetry",
        "run",
        "pyright",
        "src",
    ],
]

[build-system]
requires = [
    "poetry-core>=2.0.0,<3.0.0",
    "poetry-dynamic-versioning>=1.0.0,<2.0.0",
]
build-backend = "poetry_dynamic_versioning.backend"
