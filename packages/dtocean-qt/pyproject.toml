[project]
name = "dtocean-qt"
version = "4.0.0"
description = "Qt extensions for the DTOcean GUI"
authors = [{ name = "The DTOcean Developers" }]
maintainers = [{ name = "Mathew Topper", email = "damm_horse@yahoo.co.uk" }]
readme = "README.md"
license = "MIT"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
]
requires-python = ">=3.12,<3.15"

[project.urls]
homepage = "https://dtocean.github.io/dtocean"
repository = "https://github.com/DTOcean/dtocean"
issues = "https://github.com/DTOcean/dtocean/issues"

[tool.poetry]
exclude = [
    'src/dtocean_qt/pandas/views/_ui/icons.qrc',
    'src/dtocean_qt/pandas/views/_ui/icons/',
    'src/dtocean_qt/pandas/views/_ui/*.ui',
]
include = [
    'src/dtocean_qt/pandas/views/_ui/icons.qrc',
    'src/dtocean_qt/pandas/views/_ui/icons/',
    'src/dtocean_qt/pandas/views/_ui/*.ui',
    { path = 'src/dtocean_qt/pandas/views/_ui/icons_rc.py', format = "wheel" },
]

[tool.poetry.build]
script = "scripts/build-icons.py"

[tool.poetry.group.main]
include-groups = ["dtocean-qt"]

[tool.poetry.group.dtocean-qt.dependencies]
chardet = "^5.2.0"
pyside6 = "^6.9.0"
numpy = "^2.3.5"
pandas = "^3.0.1"

[tool.poetry.group.test-qt]
optional = true

[tool.poetry.group.test-qt.dependencies]
pytest-qt = "^4.5.0"

[tool.poetry.group.test]
optional = true
include-groups = ["test-qt"]

[tool.poetry.group.test.dependencies]
pytest = "^9.0.3"
pytest-cov = "^6.0.0"
pytest-env = "^1.1.5"

[tool.poetry.group.audit]
optional = true

[tool.poetry.group.audit.dependencies]
ruff = "^0.8.3"
pyright = "^1.1.396"
deptry = "^0.21.1"
pandas-stubs = "^3.0.0.260204"

[tool.poetry-monoranger-plugin]
enabled = true
monorepo-root = "../../"
version-pinning-rule = '^'

[tool.pyright]
typeCheckingMode = "basic"

[tool.pytest.ini_options]
filterwarnings = ['ignore:Failed to disconnect *:RuntimeWarning']

[tool.pytest_env]
QT_DEBUG_PLUGINS = 1

[tool.ruff]
line-length = 80

[tool.semantic_release]
commit_parser = "../../scripts/dtocean_commit_parser.py:DTOceanCommitParser"
commit_message = """\
chore(release): dtocean-qt@{version}

Automatically generated by python-semantic-release
"""
tag_format = "dtocean-qt-v{version}"
version_toml = ["pyproject.toml:project.version"]

[tool.semantic_release.branches.main]
match = "(main)"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.commit_parser_options]
scope_prefix = "dtocean-qt"

[tool.semantic_release.commit_parser_options.path_filters.main]
paths = ["."]

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.14", "3.13", "3.12", "audit"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [
    [
        "poetry",
        "sync",
        "--only",
        "dtocean-qt",
        "--only",
        "test",
        "--only",
        "test-qt",
    ],
]
commands = [["poetry", "run", "pytest", "tests"]]

[tool.tox.env.audit]
description = "Run audit check on code base"
skip_install = true
allowlist_externals = ["poetry"]
commands_pre = [["poetry", "sync", "--only", "dtocean-qt", "--only", "audit"]]
commands = [
    [
        "poetry",
        "run",
        "ruff",
        "check",
    ],
    [
        "poetry",
        "run",
        "pyright",
        "src",
    ],
]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0", "pyside6"]
build-backend = "poetry.core.masonry.api"
