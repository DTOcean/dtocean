name: dtocean-docs tests
on:
  push:
    branches:
      - main
    paths:
      - ".codecov.yml"
      - ".github/workflows/test-dtocean-docs.yml"
      - "packages/dtocean-docs/**"
      - "poetry.lock"
  pull_request:
    branches:
      - main
    paths:
      - ".codecov.yml"
      - ".github/workflows/test-dtocean-docs.yml"
      - "packages/dtocean-docs/**"
      - "poetry.lock"

jobs:
  pytest:
    name: Unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.14", "3.13", "3.12"]
    defaults:
      run:
        working-directory: packages/dtocean-docs
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
      - name: Install package
        uses: ./.github/actions/poetry-install
        with:
          groups: '["dtocean-core", "dtocean-docs", "test"]'
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: |
          poetry run pytest --cov src --cov-report=xml tests
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: dtocean-docs
  audit:
    name: Code audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dtocean-docs
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false
      - name: Install package
        uses: ./.github/actions/poetry-install
        with:
          groups: '["audit", "dtocean-docs"]'
          python-version: 3.14
      - name: Run ruff
        run: |
          poetry run ruff check --output-format github
      - name: Run pyright
        run: |
          poetry run pyright src
