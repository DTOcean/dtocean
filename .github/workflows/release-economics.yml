name: Continuous delivery

on:
  push:
    branches:
      - dtocean_economics

permissions:
  contents: read

env:
  DTOCEAN_ECONOMICS_DIR: packages/dtocean-economics
  RELEASING_REPO: H0R5E/dtocean

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    outputs:
      dtocean-economics-released: ${{ steps.release-dtocean-economics.outputs.released }}
      dtocean-economics-commit_sha: ${{ steps.release-dtocean-economics.outputs.commit_sha }}

    steps:
      - name: Wait for all test jobs
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.sha }}
          check-regexp: "(?i)^.*(test|audit).*$"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-no-checks: false

      # Note: We checkout the repository at the branch that triggered the workflow.
      # Python Semantic Release will automatically convert shallow clones to full clones
      # if needed to ensure proper history evaluation. However, we forcefully reset the
      # branch to the workflow sha because it is possible that the branch was updated
      # while the workflow was running, which prevents accidentally releasing un-evaluated
      # changes.
      - name: Checkout repository on release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Force release branch to be at workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      - name: Release dtocean-economics
        id: release-dtocean-economics
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          commit: ${{ github.repository == env.RELEASING_REPO }}
          directory: ${{ env.DTOCEAN_ECONOMICS_DIR }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ github.repository == env.RELEASING_REPO }}
          vcs_release: false

  publish-dtocean-economics:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.dtocean-economics-released == 'true'
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.DTOCEAN_ECONOMICS_DIR }}
    environment:
      name: testpypi
      url: https://test.pypi.org/project/dtocean-economics/
    steps:
      - name: Setup | Checkout repository on commit sha
        uses: actions/checkout@v6
        with:
          lfs: true
          ref: ${{ needs.release.outputs.dtocean-economics-commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install poetry
        uses: abatilo/actions-poetry@v2

      - name: Install poetry-monoranger-plugin
        shell: bash
        run: |
          poetry self add git+https://github.com/H0R5E/poetry-monoranger-plugin.git#include_groups

      - name: Update Poetry configuration
        run: poetry config virtualenvs.create false

      - name: Package project
        run: poetry build

      - name: Publish package distributions to PyPI
        if: ${{ github.repository == env.RELEASING_REPO }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ env.DTOCEAN_ECONOMICS_DIR }}/dist
          verbose: true
          repository-url: https://test.pypi.org/legacy/
